<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <rect width="1400" height="800" fill="#f8f6f1"/>
  <text x="700" y="90" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="40" fill="#1f2937">入力 → 処理 → 出力</text>

  <rect x="110" y="210" width="320" height="300" rx="28" fill="#d8eef2"/>
  <rect x="540" y="210" width="320" height="300" rx="28" fill="#f6dfb5"/>
  <rect x="970" y="210" width="320" height="300" rx="28" fill="#d8ead2"/>

  <text x="270" y="285" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#111827">入力</text>
  <text x="270" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">ボタン</text>
  <text x="270" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">加速度</text>
  <text x="270" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">温度</text>
  <text x="270" y="460" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">光・音</text>

  <text x="700" y="285" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#111827">処理</text>
  <text x="700" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">条件分岐</text>
  <text x="700" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">変数</text>
  <text x="700" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">繰り返し</text>
  <text x="700" y="460" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">値の対応づけ</text>

  <text x="1130" y="285" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="32" fill="#111827">出力</text>
  <text x="1130" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">LED アイコン</text>
  <text x="1130" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">数字</text>
  <text x="1130" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">アニメーション</text>
  <text x="1130" y="460" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#111827">音・メロディ</text>

  <line x1="430" y1="360" x2="540" y2="360" stroke="#374151" stroke-width="8" stroke-linecap="round"/>
  <polygon points="540,360 510,340 510,380" fill="#374151"/>

  <line x1="860" y1="360" x2="970" y2="360" stroke="#374151" stroke-width="8" stroke-linecap="round"/>
  <polygon points="970,360 940,340 940,380" fill="#374151"/>

  <text x="700" y="650" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#4b5563">micro:bit は変化を受け取り、判断し、光や音で反応する</text>
</svg>
