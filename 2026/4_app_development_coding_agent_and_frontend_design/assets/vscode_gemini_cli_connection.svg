<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">VSCode と Gemini CLI の連携</title>
  <desc id="desc">VSCode、Gemini CLI Companion、統合ターミナル、Gemini CLI、プロジェクトフォルダの関係図。</desc>
  <defs><marker id="a" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto"><path d="M0 0 12 6 0 12z" fill="#2563eb"/></marker></defs>
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="70" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#111827">VSCode と Gemini CLI のつながり</text>
  <text x="600" y="108" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" fill="#475569">同じプロジェクトフォルダを見ながら、AIにファイル操作を任せる</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="85" y="160" width="430" height="340" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
    <text x="300" y="212" text-anchor="middle" font-size="30" font-weight="700" fill="#1e3a8a">VSCode</text>
    <rect x="130" y="252" width="340" height="82" rx="14" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="300" y="286" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">Gemini CLI Companion</text>
    <text x="300" y="316" text-anchor="middle" font-size="17" fill="#475569">開いているファイル・差分を共有</text>
    <rect x="130" y="370" width="340" height="82" rx="14" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="300" y="404" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">統合ターミナル</text>
    <text x="300" y="434" text-anchor="middle" font-size="17" fill="#475569">ここで gemini を起動</text>
    <rect x="685" y="200" width="330" height="130" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <text x="850" y="257" text-anchor="middle" font-size="30" font-weight="700" fill="#166534">Gemini CLI</text>
    <text x="850" y="294" text-anchor="middle" font-size="18" fill="#475569">指示を受けて作業する</text>
    <rect x="655" y="400" width="390" height="100" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
    <text x="850" y="443" text-anchor="middle" font-size="27" font-weight="700" fill="#9a3412">プロジェクトフォルダ</text>
    <text x="850" y="476" text-anchor="middle" font-size="18" fill="#475569">index.html / server.js / votes.db</text>
    <path d="M470 411 C560 411 592 264 675 264" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#a)"/>
    <text x="580" y="357" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">gemini 起動</text>
    <path d="M850 330 L850 388" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#a)"/>
    <text x="947" y="367" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">ファイルを読む・書く</text>
    <path d="M470 293 C595 293 580 442 642 450" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="9 9"/>
    <text x="572" y="483" text-anchor="middle" font-size="17" fill="#64748b">VSCodeも同じフォルダを表示</text>
  </g>
</svg>
