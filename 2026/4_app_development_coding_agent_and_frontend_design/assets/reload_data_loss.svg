<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">リロードすると投票結果が消える理由</title>
  <desc id="desc">ブラウザのメモリにだけあるカウントが、リロードで初期化される様子。</desc>
  <defs><marker id="a" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto"><path d="M0 0 12 6 0 12z" fill="#ef4444"/></marker></defs>
  <rect width="1200" height="500" fill="#f8fafc"/>
  <text x="600" y="66" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="33" font-weight="700" fill="#111827">リロードすると、メモリ上のカウントは消える</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle">
    <rect x="110" y="135" width="350" height="245" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
    <text x="285" y="184" font-size="25" font-weight="700" fill="#1e3a8a">リロード前</text>
    <rect x="165" y="220" width="240" height="95" rx="14" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="285" y="258" font-size="20" font-weight="700" fill="#111827">JavaScriptの変数</text>
    <text x="285" y="294" font-size="22" font-weight="700" fill="#2563eb">ラーメン: 3票</text>
    <rect x="740" y="135" width="350" height="245" rx="20" fill="#fef2f2" stroke="#fca5a5" stroke-width="3"/>
    <text x="915" y="184" font-size="25" font-weight="700" fill="#991b1b">リロード後</text>
    <rect x="795" y="220" width="240" height="95" rx="14" fill="#fff" stroke="#fecaca" stroke-width="2"/>
    <text x="915" y="258" font-size="20" font-weight="700" fill="#111827">変数が作り直される</text>
    <text x="915" y="294" font-size="22" font-weight="700" fill="#dc2626">ラーメン: 0票</text>
    <path d="M485 258 C570 210 640 210 715 258" fill="none" stroke="#ef4444" stroke-width="5" marker-end="url(#a)"/>
    <text x="600" y="225" font-size="22" font-weight="700" fill="#dc2626">ページを読み直す</text>
    <text x="600" y="440" font-size="20" font-weight="700" fill="#334155">データを残すには、メモリではなくファイルやデータベースに保存する必要がある</text>
  </g>
</svg>
