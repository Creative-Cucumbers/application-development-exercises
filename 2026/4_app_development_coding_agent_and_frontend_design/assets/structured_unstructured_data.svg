<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">構造化データと非構造化データ</title>
  <desc id="desc">画像、音声、自由記述、センサー値のような非構造化データをAIで意味づけし、JSONやテーブルのような構造化データに変換する流れを示す図。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="145%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#334155" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="600" y="64" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="33" font-weight="700" fill="#111827">データの形をそろえると、アプリで扱いやすくなる</text>
  <text x="600" y="102" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#475569">AIは決まった形ではないデータから意味を取り出し、保存・検索しやすい形に変換できる</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <g filter="url(#shadow)">
      <rect x="62" y="158" width="360" height="282" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
      <rect x="780" y="158" width="360" height="282" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
      <rect x="492" y="223" width="216" height="152" rx="76" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    </g>

    <text x="242" y="210" text-anchor="middle" font-size="27" font-weight="700" fill="#9a3412">非構造化データ</text>
    <text x="960" y="210" text-anchor="middle" font-size="27" font-weight="700" fill="#1e3a8a">構造化データ</text>
    <text x="600" y="274" text-anchor="middle" font-size="28" font-weight="700" fill="#166534">AIで変換</text>
    <text x="600" y="309" text-anchor="middle" font-size="17" fill="#475569">意味を取り出す</text>
    <text x="600" y="337" text-anchor="middle" font-size="17" fill="#475569">形をそろえる</text>

    <g text-anchor="middle" font-size="18" font-weight="700" fill="#111827">
      <rect x="102" y="248" width="125" height="58" rx="12" fill="#fff" stroke="#fed7aa" stroke-width="2"/>
      <text x="164.5" y="285">画像</text>
      <rect x="257" y="248" width="125" height="58" rx="12" fill="#fff" stroke="#fed7aa" stroke-width="2"/>
      <text x="319.5" y="285">音声</text>
      <rect x="102" y="336" width="125" height="58" rx="12" fill="#fff" stroke="#fed7aa" stroke-width="2"/>
      <text x="164.5" y="373">自由記述</text>
      <rect x="257" y="336" width="125" height="58" rx="12" fill="#fff" stroke="#fed7aa" stroke-width="2"/>
      <text x="319.5" y="373">センサー値</text>
    </g>

    <g text-anchor="middle">
      <rect x="820" y="248" width="130" height="130" rx="12" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
      <text x="885" y="282" font-size="20" font-weight="700" fill="#111827">JSON</text>
      <text x="885" y="319" font-size="16" fill="#475569">{ option:</text>
      <text x="885" y="346" font-size="16" fill="#475569">"ラーメン" }</text>

      <rect x="990" y="248" width="130" height="130" rx="12" fill="#fff" stroke="#bfdbfe" stroke-width="2"/>
      <text x="1055" y="282" font-size="20" font-weight="700" fill="#111827">テーブル</text>
      <line x1="1015" y1="305" x2="1095" y2="305" stroke="#94a3b8"/>
      <line x1="1015" y1="334" x2="1095" y2="334" stroke="#94a3b8"/>
      <line x1="1046" y1="305" x2="1046" y2="362" stroke="#94a3b8"/>
      <text x="1030" y="326" font-size="13" fill="#475569">id</text>
      <text x="1072" y="326" font-size="13" fill="#475569">option</text>
      <text x="1030" y="354" font-size="13" fill="#475569">1</text>
      <text x="1072" y="354" font-size="13" fill="#475569">ラーメン</text>
    </g>

    <line x1="422" y1="299" x2="480" y2="299" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <line x1="720" y1="299" x2="768" y2="299" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-blue)"/>
    <text x="451" y="270" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">入力</text>
    <text x="744" y="270" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">出力</text>

    <text x="600" y="505" text-anchor="middle" font-size="20" font-weight="700" fill="#334155">JSONやテーブルになると、データベースに保存して検索できる</text>
  </g>
</svg>
