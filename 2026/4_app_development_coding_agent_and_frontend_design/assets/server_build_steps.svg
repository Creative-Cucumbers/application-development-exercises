<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">ミニサーバー作成の手順</title>
  <desc id="desc">npmの準備、server.js生成、index.html修正、node server.js起動、ブラウザ確認の手順。</desc>
  <defs><marker id="a" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 12 6 0 12z" fill="#2563eb"/></marker></defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="66" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="33" font-weight="700" fill="#111827">ミニサーバーを作って動かす手順</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle">
    <rect x="80" y="142" width="190" height="115" rx="16" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
    <rect x="300" y="142" width="190" height="115" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <rect x="520" y="142" width="190" height="115" rx="16" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
    <rect x="740" y="142" width="190" height="115" rx="16" fill="#fefce8" stroke="#facc15" stroke-width="3"/>
    <rect x="960" y="142" width="160" height="115" rx="16" fill="#faf5ff" stroke="#c4b5fd" stroke-width="3"/>
    <text x="175" y="185" font-size="21" font-weight="700" fill="#1e3a8a">1 npm準備</text><text x="175" y="218" font-size="16" fill="#475569">express / sqlite</text>
    <text x="395" y="185" font-size="21" font-weight="700" fill="#166534">2 生成</text><text x="395" y="218" font-size="16" fill="#475569">server.js</text>
    <text x="615" y="185" font-size="21" font-weight="700" fill="#9a3412">3 接続</text><text x="615" y="218" font-size="16" fill="#475569">index.html に fetch</text>
    <text x="835" y="185" font-size="21" font-weight="700" fill="#854d0e">4 起動</text><text x="835" y="218" font-size="16" fill="#475569">node server.js</text>
    <text x="1040" y="185" font-size="21" font-weight="700" fill="#5b21b6">5 確認</text><text x="1040" y="218" font-size="16" fill="#475569">localhost</text>
    <path d="M275 200h18M495 200h18M715 200h18M935 200h18" stroke="#2563eb" stroke-width="4" marker-end="url(#a)"/>
    <rect x="210" y="330" width="780" height="78" rx="16" fill="#fff" stroke="#dbe4ef" stroke-width="2"/>
    <text x="600" y="363" font-size="20" font-weight="700" fill="#111827">最後に確認すること</text>
    <text x="600" y="392" font-size="17" fill="#475569">投票する → リロードする → 集計が残る → votes.db ができている</text>
  </g>
</svg>
