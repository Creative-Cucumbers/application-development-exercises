<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">AIに安全に変更を頼む流れ</title>
  <desc id="desc">調査、変更案、差分、確認、受け入れの順に進めるフロー図。</desc>
  <defs><marker id="a" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 12 6 0 12z" fill="#2563eb"/></marker></defs>
  <rect width="1200" height="420" fill="#f8fafc"/>
  <text x="600" y="62" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="32" font-weight="700" fill="#111827">AIに安全に変更を頼む型</text>
  <text x="600" y="99" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" fill="#475569">いきなり書き換えず、確認できる単位で進める</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle">
    <g fill="#fff" stroke-width="3">
      <rect x="70" y="170" width="170" height="105" rx="16" stroke="#93c5fd"/>
      <rect x="285" y="170" width="170" height="105" rx="16" stroke="#86efac"/>
      <rect x="500" y="170" width="170" height="105" rx="16" stroke="#facc15"/>
      <rect x="715" y="170" width="170" height="105" rx="16" stroke="#fdba74"/>
      <rect x="930" y="170" width="200" height="105" rx="16" stroke="#c4b5fd"/>
    </g>
    <text x="155" y="211" font-size="22" font-weight="700" fill="#1e3a8a">1 調査</text>
    <text x="155" y="244" font-size="16" fill="#475569">説明だけ頼む</text>
    <text x="370" y="211" font-size="22" font-weight="700" fill="#166534">2 変更案</text>
    <text x="370" y="244" font-size="16" fill="#475569">まだ書き換えない</text>
    <text x="585" y="211" font-size="22" font-weight="700" fill="#854d0e">3 差分</text>
    <text x="585" y="244" font-size="16" fill="#475569">必要な所だけ変更</text>
    <text x="800" y="211" font-size="22" font-weight="700" fill="#9a3412">4 確認</text>
    <text x="800" y="244" font-size="16" fill="#475569">diffを見る</text>
    <text x="1030" y="211" font-size="22" font-weight="700" fill="#5b21b6">5 受け入れ</text>
    <text x="1030" y="244" font-size="16" fill="#475569">動作確認してコミット</text>
    <path d="M245 222h30" stroke="#2563eb" stroke-width="4" marker-end="url(#a)"/>
    <path d="M460 222h30" stroke="#2563eb" stroke-width="4" marker-end="url(#a)"/>
    <path d="M675 222h30" stroke="#2563eb" stroke-width="4" marker-end="url(#a)"/>
    <path d="M890 222h30" stroke="#2563eb" stroke-width="4" marker-end="url(#a)"/>
    <text x="600" y="342" font-size="20" font-weight="700" fill="#334155">AIが書く → 自分が確認する → 問題なければ採用する</text>
  </g>
</svg>
