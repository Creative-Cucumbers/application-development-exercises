<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">投票アプリのコンポーネント図</title>
  <desc id="desc">ブラウザの index.html が fetch('/vote') で server.js にリクエストを送り、server.js が SQL で votes.db を操作する構成図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="44" y="42" width="1112" height="546" rx="28" fill="#ffffff" stroke="#dbe4ef" stroke-width="2"/>

  <text x="600" y="100" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="#111827">投票アプリのデータ保存の流れ</text>
  <text x="600" y="138" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" fill="#4b5563">ブラウザは直接データベースを触らず、Node.js サーバーを通して保存する</text>

  <g filter="url(#shadow)">
    <rect x="92" y="222" width="282" height="188" rx="18" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
    <rect x="459" y="222" width="282" height="188" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <rect x="826" y="222" width="282" height="188" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <text x="233" y="276" font-size="25" font-weight="700" fill="#1e3a8a">ブラウザ</text>
    <text x="233" y="314" font-size="30" font-weight="700" fill="#111827">index.html</text>
    <text x="233" y="356" font-size="18" fill="#475569">画面を表示する</text>
    <text x="233" y="384" font-size="18" fill="#475569">ボタン操作を受け取る</text>

    <text x="600" y="276" font-size="25" font-weight="700" fill="#166534">Node.js サーバー</text>
    <text x="600" y="314" font-size="30" font-weight="700" fill="#111827">server.js</text>
    <text x="600" y="356" font-size="18" fill="#475569">Gemini CLI で生成</text>
    <text x="600" y="384" font-size="18" fill="#475569">投票リクエストを受け取る</text>

    <text x="967" y="276" font-size="25" font-weight="700" fill="#9a3412">SQLite</text>
    <text x="967" y="314" font-size="30" font-weight="700" fill="#111827">votes.db</text>
    <text x="967" y="356" font-size="18" fill="#475569">投票データを保存する</text>
    <text x="967" y="384" font-size="18" fill="#475569">リロードしても残る</text>
  </g>

  <line x1="394" y1="316" x2="436" y2="316" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="761" y1="316" x2="803" y2="316" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <rect x="385" y="438" width="141" height="42" rx="21" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="455.5" y="465" font-size="18" font-weight="700" fill="#1d4ed8">fetch('/vote')</text>

    <rect x="746" y="438" width="92" height="42" rx="21" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="792" y="465" font-size="18" font-weight="700" fill="#1d4ed8">SQL</text>
  </g>

  <path d="M 233 430 C 350 532, 486 532, 600 430" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="9 9"/>
  <text x="416" y="535" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#64748b">画面更新や集計結果は server.js から返ってくる</text>

  <text x="600" y="575" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#334155">index.html → server.js → votes.db</text>
</svg>
