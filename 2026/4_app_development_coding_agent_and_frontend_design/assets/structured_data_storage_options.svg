<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">構造化データの持ち方の4分類</title>
  <desc id="desc">構造化データの保存先として、メモリ、ファイル、RDB、NoSQL DBを比較し、投票アプリではRDBのSQLiteを使うことを示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#334155" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="64" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="34" font-weight="700" fill="#111827">構造化データをどこに持つか</text>
  <text x="600" y="102" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" fill="#475569">保存先によって「残るか」「探しやすいか」「向いている用途」が変わる</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" filter="url(#shadow)">
    <rect x="58" y="170" width="246" height="268" rx="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="3"/>
    <rect x="334" y="170" width="246" height="268" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
    <rect x="610" y="150" width="266" height="308" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="5"/>
    <rect x="906" y="170" width="246" height="268" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle">
    <text x="181" y="222" font-size="27" font-weight="700" fill="#991b1b">メモリ</text>
    <text x="181" y="258" font-size="19" font-weight="700" fill="#111827">JavaScript の変数</text>
    <text x="181" y="305" font-size="18" fill="#475569">リロードで消える</text>
    <text x="181" y="337" font-size="18" fill="#475569">一時的なUI状態</text>
    <rect x="105" y="372" width="152" height="42" rx="21" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="181" y="399" font-size="17" font-weight="700" fill="#dc2626">残らない</text>

    <text x="457" y="222" font-size="27" font-weight="700" fill="#9a3412">ファイル</text>
    <text x="457" y="258" font-size="19" font-weight="700" fill="#111827">JSON / CSV</text>
    <text x="457" y="305" font-size="18" fill="#475569">保存はできる</text>
    <text x="457" y="337" font-size="18" fill="#475569">大量検索は苦手</text>
    <rect x="381" y="372" width="152" height="42" rx="21" fill="#ffedd5" stroke="#fdba74"/>
    <text x="457" y="399" font-size="17" font-weight="700" fill="#ea580c">小規模向き</text>

    <text x="743" y="208" font-size="30" font-weight="700" fill="#1d4ed8">RDB</text>
    <text x="743" y="246" font-size="20" font-weight="700" fill="#111827">SQLite / MySQL</text>
    <text x="743" y="282" font-size="20" font-weight="700" fill="#111827">PostgreSQL</text>
    <text x="743" y="326" font-size="18" fill="#475569">テーブルで管理</text>
    <text x="743" y="358" font-size="18" fill="#475569">SQLで効率よく検索</text>
    <rect x="650" y="392" width="186" height="44" rx="22" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="743" y="420" font-size="18" font-weight="700" fill="#1d4ed8">今日使う: SQLite</text>

    <text x="1029" y="222" font-size="27" font-weight="700" fill="#166534">NoSQL DB</text>
    <text x="1029" y="258" font-size="19" font-weight="700" fill="#111827">MongoDB / Redis</text>
    <text x="1029" y="305" font-size="18" fill="#475569">用途に合わせる</text>
    <text x="1029" y="337" font-size="18" fill="#475569">リアルタイム等に強い</text>
    <rect x="953" y="372" width="152" height="42" rx="21" fill="#dcfce7" stroke="#86efac"/>
    <text x="1029" y="399" font-size="17" font-weight="700" fill="#16a34a">用途別</text>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <line x1="158" y1="505" x2="1038" y2="505" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <text x="157" y="543" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">一時的</text>
    <text x="458" y="543" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">残す</text>
    <text x="743" y="543" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">残して、SQLで探す</text>
    <text x="1037" y="543" text-anchor="middle" font-size="17" font-weight="700" fill="#475569">用途に応じて設計</text>
  </g>

  <text x="600" y="592" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="700" fill="#334155">投票アプリは「リロードしても残す」「集計する」ため、RDB の SQLite に保存する</text>
</svg>
