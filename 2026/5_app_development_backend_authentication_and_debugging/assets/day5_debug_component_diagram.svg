<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">デバッグ用のブラウザ・サーバー・データベース構成図</title>
  <desc id="desc">ブラウザ、server.js、votes.db の3層構成。POST /vote は INSERT INTO votes で保存し、GET /votes は SELECT option, COUNT で集計を取得する。</desc>
  <defs>
    <marker id="green-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="#16a34a"/></marker>
    <marker id="blue-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="#2563eb"/></marker>
    <marker id="orange-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="#ea580c"/></marker>
  </defs>
  <rect width="1280" height="640" fill="#f8fafc"/>
  <text x="640" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="35" font-weight="700" fill="#111827">デバッグでは「どの層で止まっているか」を見る</text>
  <text x="640" y="96" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" fill="#475569">ブラウザ、server.js、votes.db のどこまで処理が届いているかを切り分ける</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="78" y="185" width="302" height="250" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
    <rect x="489" y="160" width="302" height="300" rx="22" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <rect x="900" y="185" width="302" height="250" rx="22" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
    <text x="229" y="240" text-anchor="middle" font-size="29" font-weight="700" fill="#1e3a8a">ブラウザ</text>
    <text x="229" y="278" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">index.html</text>
    <text x="229" y="340" text-anchor="middle" font-size="18" fill="#475569">Console / Network</text>
    <text x="229" y="370" text-anchor="middle" font-size="18" fill="#475569">で確認する</text>
    <text x="640" y="215" text-anchor="middle" font-size="29" font-weight="700" fill="#166534">server.js</text>
    <text x="640" y="253" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Node.js + Express</text>
    <text x="640" y="335" text-anchor="middle" font-size="18" fill="#475569">API の窓口</text>
    <text x="640" y="365" text-anchor="middle" font-size="18" fill="#475569">ターミナルでログ確認</text>
    <text x="1051" y="240" text-anchor="middle" font-size="29" font-weight="700" fill="#9a3412">votes.db</text>
    <text x="1051" y="278" text-anchor="middle" font-size="23" font-weight="700" fill="#111827">SQLite</text>
    <text x="1051" y="340" text-anchor="middle" font-size="18" fill="#475569">votes テーブル</text>
    <text x="1051" y="370" text-anchor="middle" font-size="18" fill="#475569">SQL で保存・集計</text>
    <path d="M380 292 L489 292" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" marker-end="url(#green-arrow)"/>
    <rect x="390" y="242" width="138" height="34" rx="17" fill="#fff" stroke="#bbf7d0"/>
    <text x="459" y="265" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">POST /vote</text>
    <path d="M791 292 L900 292" fill="none" stroke="#ea580c" stroke-width="5" stroke-linecap="round" marker-end="url(#orange-arrow)"/>
    <rect x="800" y="242" width="158" height="34" rx="17" fill="#fff" stroke="#fed7aa"/>
    <text x="879" y="265" text-anchor="middle" font-size="15" font-weight="700" fill="#ea580c">INSERT INTO votes</text>
    <path d="M380 386 L489 386" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#blue-arrow)"/>
    <rect x="390" y="402" width="138" height="34" rx="17" fill="#fff" stroke="#bfdbfe"/>
    <text x="459" y="425" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">GET /votes</text>
    <path d="M900 386 L791 386" fill="none" stroke="#ea580c" stroke-width="5" stroke-linecap="round" marker-end="url(#orange-arrow)"/>
    <rect x="784" y="402" width="190" height="34" rx="17" fill="#fff" stroke="#fed7aa"/>
    <text x="879" y="425" text-anchor="middle" font-size="15" font-weight="700" fill="#ea580c">SELECT option, COUNT</text>
    <path d="M489 456 C432 520 315 520 265 444" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8" marker-end="url(#blue-arrow)"/>
    <text x="380" y="534" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">JSON を返して画面を更新</text>
  </g>
  <rect x="188" y="565" width="904" height="46" rx="18" fill="#fff" stroke="#dbe4ef" stroke-width="2"/>
  <text x="640" y="594" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#334155">404 は URL、500 は server.js、DB の中身は SQL と votes.db を確認する</text>
</svg>
