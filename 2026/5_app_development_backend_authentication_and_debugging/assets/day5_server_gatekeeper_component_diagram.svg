<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">サーバーがデータベースの窓口になる構成図</title>
  <desc id="desc">ブラウザはデータベースを直接触らず、HTTP API 経由で server.js に依頼する。server.js が入力確認や認証チェックを行い、必要な SQL だけを votes.db に送る。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="#2563eb"/></marker>
    <marker id="blocked" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto"><path d="M0 0 L12 6 L0 12 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="1280" height="560" fill="#f8fafc"/>
  <text x="640" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="35" font-weight="700" fill="#111827">データベースは直接公開しない</text>
  <text x="640" y="96" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" fill="#475569">server.js が「窓口・警備員」として、許可した操作だけを DB に届ける</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="90" y="180" width="270" height="210" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="3"/>
    <rect x="505" y="150" width="270" height="270" rx="22" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <rect x="920" y="180" width="270" height="210" rx="22" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
    <text x="225" y="238" text-anchor="middle" font-size="29" font-weight="700" fill="#1e3a8a">ブラウザ</text>
    <text x="225" y="278" text-anchor="middle" font-size="18" fill="#475569">誰でも触れる場所</text>
    <text x="225" y="310" text-anchor="middle" font-size="18" fill="#475569">index.html</text>
    <text x="640" y="210" text-anchor="middle" font-size="29" font-weight="700" fill="#166534">server.js</text>
    <text x="640" y="250" text-anchor="middle" font-size="19" font-weight="700" fill="#111827">API として公開</text>
    <text x="640" y="292" text-anchor="middle" font-size="17" fill="#475569">入力チェック</text>
    <text x="640" y="322" text-anchor="middle" font-size="17" fill="#475569">認証チェック</text>
    <text x="640" y="352" text-anchor="middle" font-size="17" fill="#475569">必要な結果だけ返す</text>
    <text x="1055" y="238" text-anchor="middle" font-size="29" font-weight="700" fill="#9a3412">votes.db</text>
    <text x="1055" y="278" text-anchor="middle" font-size="18" fill="#475569">中身そのもの</text>
    <text x="1055" y="310" text-anchor="middle" font-size="18" fill="#475569">直接公開しない</text>
    <path d="M360 285 L495 285" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="386" y="240" width="95" height="32" rx="16" fill="#fff" stroke="#bfdbfe"/>
    <text x="433.5" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">HTTP API</text>
    <path d="M775 285 L910 285" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect x="815" y="240" width="55" height="32" rx="16" fill="#fff" stroke="#bfdbfe"/>
    <text x="842.5" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">SQL</text>
    <path d="M310 390 C540 505 803 505 1005 392" fill="none" stroke="#dc2626" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 8" marker-end="url(#blocked)"/>
    <text x="640" y="488" text-anchor="middle" font-size="18" font-weight="700" fill="#dc2626">ブラウザから DB へ直接アクセスさせない</text>
  </g>
</svg>
