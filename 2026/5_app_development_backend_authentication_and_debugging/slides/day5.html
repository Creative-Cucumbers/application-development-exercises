<p>Day4 の途中で「アプリの開き方」が変わったことに気づいたか？</p>
<table>
<thead>
<tr>
<th></th>
<th>URL の見た目</th>
<th>意味</th>
</tr>
</thead>
<tbody>
<tr>
<td>フロントのみ</td>
<td><code>file:///Users/...</code></td>
<td>OS のファイルを直接ブラウザが開いている</td>
</tr>
<tr>
<td>バックエンド有</td>
<td><code>http://localhost:3000</code></td>
<td>ローカルで動くサーバーと HTTP 通信</td>
</tr>
<tr>
<td>デプロイ後</td>
<td><code>https://〇〇.onrender.com</code></td>
<td>インターネット上のサーバーと HTTP 通信</td>
</tr>
</tbody>
</table>
<ul>
<li><code>http://</code> から始まる ＝ 「<strong>サーバーと通信している</strong>」サイン</li>
<li><code>localhost</code> ＝ 自分のパソコン、<code>3000</code> ＝ ポート番号</li>
</ul>

</tr>
<tr>

<td>その上で動く「リクエストに返事を返す」プログラム</td>

</table>

<h2 id="%E3%81%AA%E3%81%9C%E3%82%B5%E3%83%BC%E3%83%90%E3%83%BC%E3%83%BBapi-%E3%81%8C%E5%BF%85%E8%A6%81%E3%81%AA%E3%81%AE%E3%81%8B">なぜサーバー・API が必要なのか</h2>
<p>フロントエンドだけだと困ること：</p>
<table>
<thead>
<tr>
<th>問題</th>
<th>理由</th>
</tr>
</thead>
<tbody>
<tr>
<td>データを永続化できない</td>
<td>ブラウザのメモリは閉じれば消える</td>
</tr>
<tr>
<td>データを共有できない</td>
<td>別の人のブラウザは別のメモリ</td>
</tr>
<tr>
<td>秘密情報を守れない</td>
<td>開発者ツールで誰でも見られる</td>
</tr>
<tr>
<td>重い処理に向かない</td>
<td>端末性能に依存・安定実行できない</td>
</tr>
</tbody>
</table>
<p>サーバーがあれば → 1 か所に集めて永続化・誰でも参照・秘密は隠す・安定実行</p>
</section>

<p><img src="../assets/day5_server_gatekeeper_component_diagram.svg" alt="" style="height:260px;" /></p>
<p>DB を直接ブラウザに公開してはいけない理由：</p>
<ul>
<li>誰でも全テーブルを <code>SELECT</code> できてしまう</li>
<li>誰でも <code>DELETE</code> / <code>UPDATE</code> で書き換えられる</li>
<li>DB のパスワードがフロントから見えてしまう</li>
</ul>
<blockquote>
<p><strong>覚えておきたい</strong>：フロントは「誰でも見られる場所」、サーバーは「自分のコードだけが知っている場所」。秘密・パスワード・API キーはすべてサーバー側に置く</p>
</blockquote>

<h2 id="serverjs-%E3%82%92%E6%B5%81%E3%82%8C%E3%81%A7%E8%AA%AD%E3%82%80">server.js を「流れ」で読む</h2>
<p>1 行ずつ覚える必要はない。**「リクエストが来てから返事まで」**をイメージできれば OK</p>
<p><strong>フェーズ A：起動時に 1 回だけ</strong></p>
<ol>
<li>ライブラリ読み込み（Express・better-sqlite3）</li>
<li>DB に接続（<code>votes.db</code> を開く）</li>
<li>テーブルが無ければ作る（<code>CREATE TABLE IF NOT EXISTS</code>）</li>
<li>ポート 3000 で待ち受け開始（<code>app.listen(3000)</code>）</li>
</ol>
<p><strong>フェーズ B：リクエストが来るたびに</strong></p>
<table>
<thead>
<tr>
<th>ルール</th>
<th>意味</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>app.get('/votes', ...)</code></td>
<td>集計結果を返す</td>
</tr>
<tr>
<td><code>app.post('/vote', ...)</code></td>
<td>DB に保存する</td>
</tr>
<tr>
<td><code>app.use(express.static('.'))</code></td>
<td>ファイル（HTML 等）を返す</td>
</tr>
</tbody>
</table>
</section>

<p>コードをインターネット上に保管・管理するサービス</p>

<h2 id="github-%E3%81%AE%E3%83%AA%E3%82%B9%E3%82%AFenv-%E3%81%AE%E6%B5%81%E5%87%BA">GitHub のリスク：<code>.env</code> の流出</h2>
<p>Public リポジトリの中身は <strong>世界中の誰でも読める</strong>。絶対に含めてはいけないもの：</p>
<table>
<thead>
<tr>
<th>種類</th>
<th>例</th>
</tr>
</thead>
<tbody>
<tr>
<td>秘密情報</td>
<td>パスワード・API キー・セッションシークレット</td>
</tr>
<tr>
<td>個人情報</td>
<td>氏名・住所・メールアドレス</td>
</tr>
<tr>
<td>認証情報</td>
<td>サービスのトークン・秘密鍵（<code>.pem</code>）</td>
</tr>
<tr>
<td>DB の中身</td>
<td>個人情報が入った <code>.db</code></td>
</tr>
</tbody>
</table>
<p>例：<code>SESSION_SECRET=abc123</code> や <code>ADMIN_PASSWORD=password</code> が <code>.env</code> ごと公開 → 不正アクセスや課金爆発の事例多数</p>
<blockquote>
<p><strong><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> 一度プッシュした秘密情報は取り戻せない</strong>。<code>.gitignore</code> に <code>.env</code> を<strong>必ず</strong>含める</p>
</blockquote>

<h2 id="github-%E3%81%AB%E3%83%97%E3%83%83%E3%82%B7%E3%83%A5%E3%81%99%E3%82%8B">GitHub にプッシュする</h2>
<p><img class="emoji" draggable="false" alt="🖱" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f5b1.svg" data-marp-twemoji=""/> <strong>VSCode</strong></p>
<ol>
<li>Source Control パネルを開く（<code>⇧⌘G</code> / <code>Ctrl+Shift+G</code>）</li>
<li>パネル上部 <code>…</code> → ビュー → <strong>Source Control リポジトリ</strong> を有効化</li>
<li>リポジトリ名横の <strong>雲アイコン（ブランチの発行）</strong> をクリック</li>
<li><strong>GitHub にサインイン</strong> → ブラウザで Authorize</li>
<li><strong>Public リポジトリとして発行</strong> を選択</li>
<li>リポジトリ名を確認して Enter（例：<code>app-dev-day5</code>）</li>
</ol>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> 確認：<code>https://github.com/&lt;your-account&gt;/app-dev-day5</code> を開いて <code>server.js</code> 等が見える / <strong><code>.env</code> が無いことを必ず確認</strong></p>

<h2 id="render-%E3%81%A8%E3%81%AF">Render とは</h2>
<p>GitHub と連携してアプリを公開できるクラウドサービス</p>

<td>URL を知っている誰でも</td>

<tr>
<td>起動</td>
<td><code>node server.js</code> 手動</td>
<td>push で自動デプロイ</td>
</tr>
<tr>

<td><code>https://〇〇.onrender.com</code></td>

<h2 id="%E8%AA%8D%E8%A8%BCauthentication%E3%81%A8%E8%AA%8D%E5%8F%AFauthorization">認証（Authentication）と認可（Authorization）</h2>
<p>混同しがちだが<strong>別物</strong>。両方そろって初めて「守られたアプリ」になる</p>
<table>
<thead>
<tr>

<th>例</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>認証</strong> AuthN</td>

<td>本人確認</td>
<td>パスワードで admin だと確認</td>
</tr>
<tr>
<td><strong>認可</strong> AuthZ</td>
<td>この操作していい？</td>
<td>権限チェック</td>
<td>admin だから「リセット」を押せる</td>
</tr>
</tbody>
</table>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>認証：本人かどうか     （門の前での本人確認）
認可：何ができるか     （建物に入った後、どの部屋に入れるか）
</code></pre>
<p><strong>今日：主に「認証」を実装</strong> ／ 「認可」は <code>/admin</code> の保護で軽く触れる</p>

<h2 id="%E7%8F%BE%E4%BB%A3%E3%81%AE-web-%E3%81%A7%E4%BD%BF%E3%82%8F%E3%82%8C%E3%82%8B%E8%AA%8D%E8%A8%BC%E6%89%8B%E6%B3%95%E4%BF%AF%E7%9E%B0">現代の Web で使われる認証手法（俯瞰）</h2>
<p>実装する前に「世の中にどんな方式があるか」を把握する</p>
<table>
<thead>
<tr>
<th>#</th>
<th>方式</th>
<th>仕組み</th>
<th>使われる場面</th>
</tr>
</thead>
<tbody>
<tr>
<td>①</td>
<td><strong>パスワード＋セッション</strong></td>
<td>ID/PW → セッション + Cookie</td>
<td>多くの Web サービス</td>
</tr>
<tr>
<td>②</td>
<td><strong>API キー / トークン</strong></td>
<td>ヘッダに秘密キー</td>
<td>機械間通信（OpenAI・Stripe）</td>
</tr>
<tr>
<td>③</td>
<td><strong>JWT</strong></td>
<td>署名済みトークンを毎回送る</td>
<td>SPA・モバイル・マイクロサービス</td>
</tr>
<tr>
<td>④</td>
<td><strong>OAuth / SSO</strong></td>
<td>外部サービスに認証を委譲</td>
<td>「Sign in with Google」</td>
</tr>
<tr>
<td>⑤</td>
<td><strong>MFA / 2FA</strong></td>
<td>パスワード + SMS / TOTP / FIDO</td>
<td>銀行・SNS の二段階認証</td>
</tr>
<tr>
<td>⑥</td>
<td><strong>パスワードレス</strong></td>
<td>パスキー・マジックリンク</td>
<td>Apple ID・Slack</td>
</tr>
</tbody>
</table>
<p>実サービスは複数を組み合わせる（例：一般ユーザー ① + ⑤、管理者 ⑥）</p>

<h2 id="%E3%82%BB%E3%83%83%E3%82%B7%E3%83%A7%E3%83%B3%E3%81%A8%E3%81%AF">セッションとは</h2>

<tr>
<td>証明書発行</td>

</tbody>
</table>
